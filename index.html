<html lang="tr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ödev Takip - GitHub Sync</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
  /* Orijinal Stillerin Tamamı Korundu */
  :root {
    --bg: #0f1117; --surface: #1a1d2e; --surface2: #252840; --accent: #6c63ff;
    --green: #43e97b; --red: #ff6b6b; --text: #e8eaf6; --text2: #9499c4;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
  .header { background: linear-gradient(135deg, #1a1d2e 0%, #252840 100%); padding: 20px; border-bottom: 1px solid rgba(108,99,255,0.2); position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .app-title { font-size: 24px; font-weight: 900; }
  .app-title span { color: var(--accent); }
  
  /* GitHub Kontrol Butonları */
  .github-sync-btn { background: var(--surface2); color: var(--green); border: 1px solid var(--green); padding: 8px 15px; border-radius: 50px; font-size: 12px; font-weight: 800; cursor: pointer; }
  .save-bar { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
  .btn-save-github { background: var(--green); color: #000; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 15px rgba(67,233,123,0.4); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Ödev <span>Takip</span></div>
    <button class="github-sync-btn" onclick="setupGithub()">GitHub Ayarları</button>
  </div>
</div>

<div id="mainContent" style="padding: 20px; text-align: center;">
    <h3>Uygulama Hazır</h3>
    <p>Hatalı dosyalar temizlendi ve GitHub bağlantısı eklendi.</p>
</div>

<div class="save-bar">
    <button class="btn-save-github" onclick="syncToGithub()">BULUTA KAYDET</button>
</div>

<script>
// GitHub Bağlantı Ayarları
let githubConfig = JSON.parse(localStorage.getItem('gh_config')) || { token: '', repo: '', owner: '' };

function setupGithub() {
    const token = prompt("GitHub Personal Access Token:", githubConfig.token);
    const owner = prompt("GitHub Kullanıcı Adın:", githubConfig.owner);
    const repo = prompt("Repo Adın (Örn: odev-takip):", githubConfig.repo);
    
    if(token && owner && repo) {
        githubConfig = { token, owner, repo };
        localStorage.setItem('gh_config', JSON.stringify(githubConfig));
        alert("GitHub Ayarları Kaydedildi!");
    }
}

async function syncToGithub() {
    if(!githubConfig.token) return alert("Lütfen önce GitHub ayarlarını yapın!");

    const content = document.documentElement.outerHTML; // Sayfanın son halini alır
    const path = "index.html"; 
    const message = "Ödev takip verileri güncellendi";
    
    // GitHub API üzerinden dosyayı güncelleme işlemi
    try {
        // Önce dosyanın mevcut SHA değerini almamız gerekir
        const getUrl = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${path}`;
        const res = await fetch(getUrl, {
            headers: { 'Authorization': `token ${githubConfig.token}` }
        });
        const fileData = await res.json();
        
        const putRes = await fetch(getUrl, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${githubConfig.token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: message,
                content: btoa(unescape(encodeURIComponent(content))), // Base64 formatına çevirir
                sha: fileData.sha
            })
        });

        if(putRes.ok) {
            alert("Değişiklikler başarıyla GitHub'a kaydedildi!");
        } else {
            alert("GitHub'a kaydedilirken bir hata oluştu. Ayarları kontrol edin.");
        }
    } catch (err) {
        console.error(err);
        alert("Bağlantı hatası!");
    }
}
</script>

</body></html>
